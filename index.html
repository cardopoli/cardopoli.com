<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>cardopoli.</title>
    <meta name="description" content="Enrico Policardo - photographer, creative director, multimedia artist. London.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Top Bar -->
    <header id="topbar">
        <a href="/" class="logo">cardopoli.</a>
        <nav id="topnav">
            <a href="/info" data-page="info">Info</a>
        </nav>
    </header>

    <!-- Banner -->
    <section id="banner">
        <div class="banner-img"></div>
    </section>

    <!-- Category Filter -->
    <nav id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
    </nav>

    <!-- Grid -->
    <main id="main">
        <section id="grid"></section>
    </main>

    <!-- Page View (Info) -->
    <section id="page-view">
        <div id="page-content"></div>
        <a href="/" class="page-back" data-page="home">&larr; Back</a>
    </section>

    <!-- Modal -->
    <div id="modal">
        <div id="modal-bg"></div>
        <button id="modal-close">&times;</button>
        <button id="modal-prev">&larr;</button>
        <button id="modal-next">&rarr;</button>
        <div id="modal-img-wrap">
            <img id="modal-img" src="" alt="">
        </div>
        <div id="modal-caption"></div>
    </div>

    <script src="/js/site.js"></script>
</body>
</html>
