backend:
  name: github
  repo: cardopoli/cardopoli.com
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://cardopoli.com

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly name, e.g. smoke-signals" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - { label: "Order", name: "order", widget: "number", default: 1, hint: "Lower numbers appear first" }
      - label: "Images"
        name: "images"
        widget: "list"
        fields:
          - { label: "Image", name: "src", widget: "image" }
          - { label: "Hi-res Image", name: "hires", widget: "image", required: false, hint: "Optional larger version for modal view" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - label: "Tags"
            name: "tags"
            widget: "select"
            multiple: true
            required: false
            options:
              - { label: "Still Life", value: "still-life" }
              - { label: "Ecommerce", value: "ecommerce" }
              - { label: "People", value: "people" }
              - { label: "Interiors", value: "interiors" }
              - { label: "Street", value: "street" }
              - { label: "Personal", value: "personal" }
              - { label: "Editorial", value: "editorial" }
              - { label: "Events", value: "events" }
          - { label: "Double width", name: "wide", widget: "boolean", default: false, required: false, hint: "Make this image span 2 columns in the grid" }

  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "content/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", default: "cardopoli." }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Banner Image", name: "banner_image", widget: "image", required: false, hint: "The GIF/image for the full-screen banner" }
          - label: "Social Links"
            name: "social"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
