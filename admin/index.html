<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cardopoli. — CMS</title>
    <script src="https://esm.sh/sveltia-cms@2.15.0"></script>
    <script>
        window.sveltiaConfig = {
            backend: {
                name: 'github',
                repo: 'cardopoli/cardopoli.com',
                branch: 'main',
                auth_type: 'pkce',
                app_id: 'Ov23liLOSpLP2NlN6qA6'
            },
            media_folder: 'content/uploads',
            public_folder: '/uploads',
            collections: [
                {
                    name: 'settings',
                    label: 'Site Settings',
                    files: [
                        {
                            name: 'general',
                            label: 'General Settings',
                            file: 'content/settings.json',
                            format: 'json',
                            fields: [
                                { label: 'Site Title', name: 'title', widget: 'string', default: 'cardopoli.' },
                                { label: 'Description', name: 'description', widget: 'text', default: 'Photography & Art Direction' },
                                { label: 'Desktop Columns', name: 'columns', widget: 'select', options: ['4', '6', '7', '8'], default: '7' },
                                { label: 'Mobile Columns', name: 'mobile_columns', widget: 'select', options: ['1', '2'], default: '2' },
                                { label: 'Curved Image Edges', name: 'curved_edges', widget: 'boolean', default: true },
                                { label: 'Show Photo Overlay on Hover', name: 'photo_overlay', widget: 'boolean', default: true },
                                { label: 'Background Colour', name: 'color_bg', widget: 'color', default: '#120b00' },
                                { label: 'Text Colour', name: 'color_text', widget: 'color', default: '#ffb000' },
                                { label: 'Header Background', name: 'color_header_bg', widget: 'color', default: '#120b00' },
                                { label: 'Font Family', name: 'font_family', widget: 'select', options: ['VT323', 'Inter', 'Georgia', 'Courier New', 'Arial', 'Helvetica'], default: 'VT323' },
                                { label: 'Logo Size', name: 'logo_size', widget: 'string', default: '18px' },
                                { label: 'Banner GIF', name: 'banner_gif', widget: 'image', hint: 'Full viewport banner' },
                                { label: 'Logo Image', name: 'logo_image', widget: 'image', required: false, hint: 'Optional - replaces text logo' },
                                { label: 'Show Sidebar', name: 'show_sidebar', widget: 'boolean', default: true }
                            ]
                        }
                    ]
                },
                {
                    name: 'projects',
                    label: 'Projects',
                    folder: 'content/projects',
                    create: true,
                    slug: '{{slug}}',
                    fields: [
                        { label: 'Project Title', name: 'title', widget: 'string' },
                        { label: 'Slug', name: 'slug', widget: 'string' },
                        { label: 'Description', name: 'description', widget: 'text', required: false },
                        { label: 'Category', name: 'category', widget: 'string', hint: 'e.g. still life, ecommerce, people' },
                        { 
                            label: 'Photos', 
                            name: 'photos', 
                            widget: 'list', 
                            fields: [
                                { label: 'Photo', name: 'image', widget: 'image' },
                                { label: 'Caption', name: 'caption', widget: 'string', required: false },
                                { label: 'Alt Text', name: 'alt', widget: 'string', required: false }
                            ] 
                        },
                        { label: 'Publish Date', name: 'date', widget: 'datetime' }
                    ]
                },
                {
                    name: 'pages',
                    label: 'Pages',
                    folder: 'content/pages',
                    create: true,
                    slug: '{{slug}}',
                    fields: [
                        { label: 'Page Title', name: 'title', widget: 'string' },
                        { label: 'Slug', name: 'slug', widget: 'string' },
                        { label: 'Content', name: 'body', widget: 'markdown' }
                    ]
                }
            ]
        };
    </script>
</head>
<body>
    <script>
        CMS.init();
    </script>
</body>
</html>
